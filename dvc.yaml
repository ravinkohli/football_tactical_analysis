stages:
  convert_issia:
    desc: Convert the raw ISSIA-CNR dataset (ViPER .xgtf + DivX .avi) to COCO format.
    cmd: >-
      python -m src.data.convert_issia
      --raw-dir data/issia_raw
      --out-dir data/issia_coco
      --sample-rate ${convert_issia.sample_rate}
      --ball-size ${convert_issia.ball_size}
    deps:
      - src/data/convert_issia.py
      - data/issia_raw
    params:
      - convert_issia.sample_rate
      - convert_issia.ball_size
    outs:
      - data/issia_coco

  convert_soccer_player_detection:
    desc: Convert the Soccer Player Detection dataset (.mat + .jpg) to COCO format.
    cmd: >-
      python -m src.data.convert_soccer_player_detection
      --raw-dir data/SoccerPlayerDetection_raw
      --out-dir data/SoccerPlayerDetection_coco
      --sample-rate ${convert_soccer_player_detection.sample_rate}
    deps:
      - src/data/convert_soccer_player_detection.py
      - data/SoccerPlayerDetection_raw
    params:
      - convert_soccer_player_detection.sample_rate
    outs:
      - data/SoccerPlayerDetection_coco
